name: Deploy MoneyFi to GitHub Pages

on:
  push:
    branches:
      - main          # triggers on every push to main
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

permissions:
  contents: write     # needed to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your source code
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Copy index.html to a staging folder
      - name: Prepare deploy folder
        run: |
          mkdir -p deploy
          cp index.html deploy/index.html

      # 3. Inject the real API key — replaces the placeholder string
      #    The key itself never appears in your repo source code
      - name: Inject Anthropic API key
        run: |
          sed -i "s|YOUR_ANTHROPIC_API_KEY_HERE|${{ secrets.ANTHROPIC_API_KEY }}|g" deploy/index.html

      # 4. Verify injection worked (prints line without exposing the key)
      - name: Verify injection
        run: |
          if grep -q "YOUR_ANTHROPIC_API_KEY_HERE" deploy/index.html; then
            echo "ERROR: Placeholder still present — secret may not be set"
            exit 1
          else
            echo "OK: API key injected successfully"
          fi

      # 5. Copy any other assets (service worker, icons, manifest) if they exist
      - name: Copy assets
        run: |
          for f in service-worker.js manifest.json favicon.ico; do
            [ -f "$f" ] && cp "$f" deploy/ && echo "Copied $f" || echo "Skipped $f (not found)"
          done
          [ -d "icons" ] && cp -r icons deploy/icons && echo "Copied icons/" || echo "Skipped icons/ (not found)"

      # 6. Deploy to gh-pages branch (GitHub Pages serves from here)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          commit_message: "Deploy ${{ github.sha }} — API key injected"
